<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raikiri Audio Client</title>
    <style>
        body {
            background-color: #0f0f13;
            color: #d1d1d1;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { color: #53fc18; }
        .status { margin-top: 10px; font-size: 14px; opacity: 0.8; }
        
        #enable-audio-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #9146FF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #enable-audio-btn:hover { background-color: #7a3add; }
    </style>
</head>
<body>
    <h1>Raikiri Audio Hub</h1>
    <p>Leave this source active to play stream TTS & alert sounds directly.</p>
    <div id="status" class="status">Waiting for connection...</div>
    
    <button id="enable-audio-btn" style="display:none;">Enable Audio</button>
    <audio id="audio-output" autoplay playsinline></audio>

    <script type="module">
        import { connectEvents } from "/shared/ws-client.js";

        const statusEl = document.getElementById('status');
        const btn = document.getElementById('enable-audio-btn');
        const audioOutput = document.getElementById('audio-output');
        
        let audioUnlocked = false;
        let audioQueue = [];
        let isPlaying = false;
        let playbackTimer = null;
        let lastObjectUrl = null;
        const PLAYBACK_TIMEOUT_MS = 20_000;

        function setReadyState(message = "Audio ready. Listening for events...") {
            btn.style.display = 'none';
            statusEl.innerText = message;
            statusEl.style.color = "#53fc18";
        }

        function setBlockedState() {
            btn.style.display = 'inline-block';
            statusEl.innerText = "Connected. OBS/browser blocked autoplay; click Enable Audio once.";
            statusEl.style.color = "#ffd166";
        }

        function loadAudio(buffer, volume) {
            if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);

            const blob = new Blob([buffer], { type: 'audio/mpeg' });
            const objectUrl = URL.createObjectURL(blob);
            lastObjectUrl = objectUrl;

            audioOutput.volume = Math.max(0, Math.min(1, (volume ?? 50) / 100));
            audioOutput.src = objectUrl;
            audioOutput.load();
        }

        function clearPlaybackTimer() {
            if (playbackTimer) {
                clearTimeout(playbackTimer);
                playbackTimer = null;
            }
        }

        function releaseObjectUrl() {
            if (lastObjectUrl) {
                URL.revokeObjectURL(lastObjectUrl);
                lastObjectUrl = null;
            }
        }

        function finishCurrentPlayback() {
            if (!isPlaying) return;

            clearPlaybackTimer();
            releaseObjectUrl();
            isPlaying = false;
            if (audioQueue.length === 0) {
                setReadyState();
                return;
            }
            void playNextQueuedAudio();
        }

        audioOutput.addEventListener('ended', finishCurrentPlayback);

        audioOutput.addEventListener('error', () => {
            console.warn("Audio element reported a playback error.");
            finishCurrentPlayback();
        });

        function normalizeAudioPayload(data) {
            if (typeof data.buffer === 'string') {
                return { ...data, buffer: Uint8Array.from(atob(data.buffer), c => c.charCodeAt(0)) };
            }
            return data;
        }

        async function playAudioPayload(data) {
            data = normalizeAudioPayload(data);
            loadAudio(data.buffer, data.volume);
            await audioOutput.play();
            audioUnlocked = true;
            setReadyState("Playing audio...");
            console.log(`Playing audio: ${data.id}`);
        }

        async function playNextQueuedAudio() {
            if (isPlaying || audioQueue.length === 0) return;

            const next = audioQueue.shift();
            isPlaying = true;

            try {
                await playAudioPayload(next);
                clearPlaybackTimer();
                playbackTimer = setTimeout(() => {
                    console.warn(`Audio playback timed out after ${PLAYBACK_TIMEOUT_MS}ms.`);
                    audioOutput.pause();
                    audioOutput.removeAttribute('src');
                    audioOutput.load();
                    finishCurrentPlayback();
                }, PLAYBACK_TIMEOUT_MS);
            } catch (err) {
                console.warn("Audio playback blocked or failed:", err);
                clearPlaybackTimer();
                releaseObjectUrl();
                audioQueue.unshift(next);
                isPlaying = false;
                setBlockedState();
            }
        }

        function enqueueAudioPayload(data) {
            audioQueue.push(data);
            statusEl.innerText = isPlaying
                ? `Playing audio... ${audioQueue.length} queued.`
                : "Audio queued.";
            void playNextQueuedAudio();
        }

        async function unlockAudio() {
            try {
                // A silent data URI gives browsers/OBS a gesture-bound media play without needing Web Audio.
                audioOutput.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQQAAAAAAA==";
                audioOutput.volume = 0;
                await audioOutput.play();
                audioUnlocked = true;
                audioOutput.volume = 1;
                setReadyState();
                await playNextQueuedAudio();
            } catch (err) {
                setBlockedState();
            }
        }

        btn.addEventListener('click', unlockAudio);

        connectEvents('/ws/audio', {
            connect: () => {
                if (!audioUnlocked) {
                    statusEl.innerText = "Connected. Autoplay will be attempted on the next sound.";
                }
            },
            play_audio: (data) => {
                enqueueAudioPayload(data);
            }
        });
    </script>
</body>
</html>
