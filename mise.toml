[tools]
go = "1.26.3"

[env]
CGO_ENABLED = "0"
VERSION = "v3.2.5"

[tasks.build]
description = "Build the native Raikiri binary"
run = "mkdir -p dist && go build -trimpath -ldflags=\"-s -w -X main.version=$VERSION\" -o dist/raikiri ./cmd/raikiri"

[tasks.release]
description = "Build release binaries for Linux, Windows, and macOS"
run = """
rm -rf dist/release
mkdir -p dist/release
GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION" -o dist/release/raikiri-linux-amd64 ./cmd/raikiri
GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION" -o dist/release/raikiri-linux-arm64 ./cmd/raikiri
GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION" -o dist/release/raikiri-windows-amd64.exe ./cmd/raikiri
GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION" -o dist/release/raikiri-darwin-arm64 ./cmd/raikiri
GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=$VERSION" -o dist/release/raikiri-darwin-amd64 ./cmd/raikiri
"""

[tasks.release-sha256]
description = "Generate SHA256 checksums for release binaries"
depends = ["release"]
run = "cd dist/release && sha256sum * > SHA256SUMS"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."
